<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f766e" />
  <title>Session Tracker</title>

  <!-- PWA / iOS home-screen app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sessions" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <h1 id="view-title">Dashboard</h1>
      <button id="add-btn" class="icon-btn" title="New therapy plan" aria-label="New therapy plan">+</button>
    </header>

    <!-- Views are injected here -->
    <main id="view"></main>

    <!-- Bottom tab bar (iOS style) -->
    <nav class="tabbar">
      <button class="tab" data-view="dashboard">
        <span class="tab-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5"/>
            <path d="M5 9.6V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.6"/>
            <path d="M9.5 21v-5.5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V21"/>
          </svg>
        </span><span class="tab-lbl">Home</span>
      </button>
      <button class="tab" data-view="sessions">
        <span class="tab-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4.5" width="18" height="16.5" rx="3"/>
            <path d="M3 9.5h18"/>
            <path d="M8 2.5v4M16 2.5v4"/>
            <path d="M7.5 14h2M14.5 14h2M7.5 17.5h2M14.5 17.5h2"/>
          </svg>
        </span><span class="tab-lbl">Sessions</span>
      </button>
      <button class="tab" data-view="cta">
        <span class="tab-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="m8.2 12.2 2.6 2.6 5-5.4"/>
          </svg>
        </span><span class="tab-lbl">Daily</span>
      </button>
      <button class="tab" data-view="resources">
        <span class="tab-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 6.6C10.4 5.1 7.4 4.6 4 5.2v13c3.4-.6 6.4-.1 8 1.4 1.6-1.5 4.6-2 8-1.4v-13c-3.4-.6-6.4-.1-8 1.4Z"/>
            <path d="M12 6.6v13.4"/>
          </svg>
        </span><span class="tab-lbl">Resources</span>
      </button>
    </nav>
  </div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
