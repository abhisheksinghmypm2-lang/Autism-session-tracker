<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f766e" />
  <title>Session Tracker</title>

  <!-- PWA / iOS home-screen app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sessions" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <h1 id="view-title">Dashboard</h1>
      <button id="add-btn" class="icon-btn" title="New therapy plan" aria-label="New therapy plan">+</button>
    </header>

    <!-- Views are injected here -->
    <main id="view"></main>

    <!-- Bottom tab bar (iOS style) -->
    <nav class="tabbar">
      <button class="tab" data-view="dashboard">
        <span class="tab-ico">🏠</span><span class="tab-lbl">Home</span>
      </button>
      <button class="tab" data-view="sessions">
        <span class="tab-ico">📅</span><span class="tab-lbl">Sessions</span>
      </button>
      <button class="tab" data-view="cta">
        <span class="tab-ico">✅</span><span class="tab-lbl">Daily</span>
      </button>
      <button class="tab" data-view="resources">
        <span class="tab-ico">📚</span><span class="tab-lbl">Resources</span>
      </button>
    </nav>
  </div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
